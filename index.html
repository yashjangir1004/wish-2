```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Women's Day ❤️</title>

<style>

body{
margin:0;
padding:0;
font-family: 'Arial', sans-serif;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#ff758c,#ff7eb3);
overflow:hidden;
color:white;
text-align:center;
}

.container{
background: rgba(255,255,255,0.15);
padding:40px;
border-radius:20px;
backdrop-filter: blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1{
font-size:40px;
margin-bottom:10px;
}

p{
font-size:20px;
line-height:1.6;
}

button{
margin-top:20px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:30px;
background:white;
color:#ff4f81;
cursor:pointer;
font-weight:bold;
}

button:hover{
transform:scale(1.1);
}

.heart{
position:absolute;
color:white;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-10vh);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">
<h1>Happy Women's Day 💐</h1>

<p>
To the most amazing girl in my life ❤️  
You are strong, beautiful, and the reason my world feels so special.
</p>

<p>
Thank you for being my happiness, my peace, and my little hurricane.
</p>

<button onclick="showMessage()">Click for a Surprise 💌</button>

<p id="loveMessage" style="margin-top:20px;font-size:22px;font-weight:bold;"></p>

</div>

<script>

function showMessage(){
document.getElementById("loveMessage").innerHTML =
"I love you so much vaani ❤️";
}

function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+10)+"px";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);
}

setInterval(createHeart,300);

</script>

</body>
</html>
